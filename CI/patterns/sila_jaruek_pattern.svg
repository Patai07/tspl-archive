<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <!-- Dark Background -->
  <rect width="600" height="600" fill="#060F22"/>
  
  <pattern id="sila-text" width="150" height="150" patternUnits="userSpaceOnUse">
    <!-- Increased opacity to 0.3 so it's clearly visible. You can lower it in Illustrator -->
    <text x="10" y="30" fill="#D4AF37" font-family="sans-serif" font-size="14" opacity="0.3">ก ข ค ง จ ฉ</text>
    <text x="70" y="70" fill="#D4AF37" font-family="sans-serif" font-size="14" opacity="0.3">ลวดลายไทย</text>
    <text x="20" y="110" fill="#D4AF37" font-family="sans-serif" font-size="12" opacity="0.3">มรดกแห่งสยาม</text>
    <text x="90" y="25" fill="#D4AF37" font-family="sans-serif" font-size="13" opacity="0.3">สัญวิทยา</text>
  </pattern>
  
  <rect width="100%" height="100%" fill="url(#sila-text)" />
</svg>

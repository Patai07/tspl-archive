<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#FCFCFC"/>
  <text x="30" y="50" font-family="sans-serif" font-size="24" font-weight="bold" fill="#0F172A">TSPL Color Palette</text>
  
  <!-- Primary Gold/Red -->
  <rect x="30" y="80" width="100" height="100" fill="#FF4E45" rx="8"/>
  <text x="140" y="105" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0F172A">TSPL Gold/Red</text>
  <text x="140" y="130" font-family="sans-serif" font-size="14" fill="#64748B">HEX: #FF4E45</text>
  <text x="140" y="150" font-family="sans-serif" font-size="14" fill="#64748B">RGB: 255, 78, 69</text>
  <text x="140" y="170" font-family="sans-serif" font-size="14" fill="#64748B">CMYK: 0, 69, 73, 0</text>

  <!-- TSPL Blue/Navy -->
  <rect x="30" y="200" width="100" height="100" fill="#0F172A" rx="8"/>
  <text x="140" y="225" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0F172A">TSPL Blue/Navy</text>
  <text x="140" y="250" font-family="sans-serif" font-size="14" fill="#64748B">HEX: #0F172A</text>
  <text x="140" y="270" font-family="sans-serif" font-size="14" fill="#64748B">RGB: 15, 23, 42</text>
  <text x="140" y="290" font-family="sans-serif" font-size="14" fill="#64748B">CMYK: 64, 45, 0, 84</text>

  <!-- Heritage Gold -->
  <rect x="330" y="80" width="100" height="100" fill="#D4AF37" rx="8"/>
  <text x="440" y="105" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0F172A">Heritage Gold</text>
  <text x="440" y="130" font-family="sans-serif" font-size="14" fill="#64748B">HEX: #D4AF37</text>
  <text x="440" y="150" font-family="sans-serif" font-size="14" fill="#64748B">RGB: 212, 175, 55</text>
  <text x="440" y="170" font-family="sans-serif" font-size="14" fill="#64748B">CMYK: 0, 17, 74, 17</text>

  <!-- Blueprint Blue -->
  <rect x="330" y="200" width="100" height="100" fill="#4D8EFF" rx="8"/>
  <text x="440" y="225" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0F172A">Blueprint Blue</text>
  <text x="440" y="250" font-family="sans-serif" font-size="14" fill="#64748B">HEX: #4D8EFF</text>
  <text x="440" y="270" font-family="sans-serif" font-size="14" fill="#64748B">RGB: 77, 142, 255</text>
</svg>

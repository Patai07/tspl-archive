<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <!-- Deep Space Gradient Background -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#010509"/>
      <stop offset="50%" stop-color="#040C1A"/>
      <stop offset="100%" stop-color="#060F20"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="500" height="500" fill="url(#bg-grad)"/>

  <!-- Watermark Text -->
  <text x="-40" y="200" fill="#FF4E45" font-family="sans-serif" font-size="300" font-weight="bold" opacity="0.03">ก</text>
  
  <!-- Radar Center Group -->
  <g transform="translate(250, 250)">
    
    <!-- Outer Ring (r1) -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="rgba(255, 78, 69, 0.1)" stroke-width="2"/>
    <path d="M -150 0 A 150 150 0 0 1 150 0" fill="none" stroke="#FF4E45" stroke-width="2" filter="url(#glow)"/>
    
    <!-- Middle Dashed Ring (r2) -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="rgba(255, 78, 69, 0.4)" stroke-width="2" stroke-dasharray="10 15"/>
    
    <!-- Inner Ring (r3) -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="rgba(255, 78, 69, 0.1)" stroke-width="2"/>
    <path d="M -90 0 A 90 90 0 0 0 90 0" fill="none" stroke="#FF4E45" stroke-width="3" filter="url(#glow)"/>

    <!-- Crosshairs -->
    <line x1="-170" y1="0" x2="-130" y2="0" stroke="#FF4E45" stroke-width="1" opacity="0.5"/>
    <line x1="130" y1="0" x2="170" y2="0" stroke="#FF4E45" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-170" x2="0" y2="-130" stroke="#FF4E45" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="130" x2="0" y2="170" stroke="#FF4E45" stroke-width="1" opacity="0.5"/>

    <!-- Loading Text -->
    <text x="0" y="15" fill="#FF4E45" font-family="monospace" font-size="48" font-weight="bold" text-anchor="middle" filter="url(#glow)">99%</text>
    
    <!-- Subtitle -->
    <text x="0" y="45" fill="#FF4E45" font-family="monospace" font-size="10" letter-spacing="4" text-anchor="middle" opacity="0.8">SCANNING PATTERN</text>
  </g>
</svg>

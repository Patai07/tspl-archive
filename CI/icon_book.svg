<line x1="125" y1="90" x2="155" y2="90" stroke="#FF4E45" stroke-width="5" stroke-linecap="round"/>
<line x1="125" y1="110" x2="155" y2="110" stroke="#FF4E45" stroke-width="5" stroke-linecap="round"/>
</svg>

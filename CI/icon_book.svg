<!-- BOOK LEFT -->
<path d="M30 40 Q70 30 95 40 L95 150 Q70 140 30 150 Z" 
stroke="#FF4E45" stroke-width="6" fill="none" stroke-linejoin="round"/>
<!-- BOOK RIGHT -->
